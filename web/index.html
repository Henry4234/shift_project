<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班設計系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
      .calendar-cell.holiday { background: #ffe6e6; }
      .calendar-cell.workday { background: #e6ffe6; }
      .calendar-cell.today { border: 2px solid #007bff; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row g-0">
            <!-- 左側員工列表 -->
            <aside class="vertical-sidebar">
                <input type="checkbox" role="switch" id="sidebar-toggle" class="checkbox-input" checked />
                <nav>
                    <header>
                        <div class="sidebar__toggle-container">
                            <label for="sidebar-toggle" class="nav__toggle">
                                <span class="toggle--icons">
                                    <svg width="24" height="24" viewBox="0 0 24 24" class="toggle-svg-icon toggle--open">
                                        <path d="M3 5a1 1 0 1 0 0 2h18a1 1 0 1 0 0-2zM2 12a1 1 0 0 1 1-1h18a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1M2 18a1 1 0 0 1 1-1h18a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1"></path>
                                    </svg>
                                    <svg width="24" height="24" viewBox="0 0 24 24" class="toggle-svg-icon toggle--close">
                                        <path d="M18.707 6.707a1 1 0 0 0-1.414-1.414L12 10.586 6.707 5.293a1 1 0 0 0-1.414 1.414L10.586 12l-5.293 5.293a1 1 0 1 0 1.414 1.414L12 13.414l5.293 5.293a1 1 0 0 0 1.414-1.414L13.414 12z"></path>
                                    </svg>
                                </span>
                            </label>
                        </div>
                        <figure>
                            <h3 class="mb-0 text-center">員工列表</h3>
                        </figure>
                    </header>
                    <section class="sidebar__wrapper">
                        <div id="member-list" class="sidebar__list list--primary">
                            <!-- 動態載入員工列表 -->
                        </div>
                    </section>
                </nav>
            </aside>

            <!-- 右側排班區域 -->
            <div id="main-content" class="col p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>排班表</h3>
                    <div class="d-flex gap-2">
                        <!-- 視圖模式選擇器 -->
                        <select class="form-select" id="view-mode">
                            <option value="calendar">月曆模式</option>
                            <option value="roster">人員模式</option>
                            <option value="daily">每日上班人員模式</option>
                        </select>
                    </div>
                </div>

                <!-- 月曆容器 -->
                <div id="calendar-container"></div>

                <!-- 人員排班表容器 -->
                <div id="roster-container" style="display: none;"></div>

                <!-- 每日上班人員容器 -->
                <div id="daily-container" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- JavaScript 依賴 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales-all.global.min.js"></script>
    
    <!-- 應用程式腳本 -->
    <script src="app.js"></script>
    <script src="view_modes.js"></script>

    <!-- 表格樣式 -->
    <style>
        .roster-table {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
        }
        .roster-table th,
        .roster-table td {
            min-width: 60px;
            text-align: center;
            vertical-align: middle;
        }
        .roster-table th:first-child,
        .roster-table td:first-child {
            min-width: 120px;
            position: sticky;
            left: 0;
            background-color: #fff;
            z-index: 1;
        }
        .roster-table thead th {
            position: sticky;
            top: 0;
            background-color: #fff;
            z-index: 1;
        }
        .roster-table thead th:first-child {
            z-index: 2;
        }
    </style>
</body>
</html>
